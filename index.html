<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Română Step by Step</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --gold: #c9962a;
    --gold-light: #f5e9c8;
    --blue: #2d5a9e;
    --blue-light: #e8eef8;
    --green: #2a7a4b;
    --green-light: #e4f2ea;
    --purple: #534ab7;
    --purple-light: #eeedfe;
    --teal: #0f6e56;
    --teal-light: #e1f5ee;
    --paper: #ffffff;
    --bg: #f4f3f0;
    --text: #1a2744;
    --muted: #6b7280;
    --border: rgba(26, 39, 68, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
  }

  a { color: inherit; text-decoration: none; }

  .shell {
    width: 100%;
    max-width: none;
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
  }

  .topbar {
    min-height: 66px;
    padding: 0 clamp(1.25rem, 3vw, 2.75rem);
    background: var(--navy);
    color: #fff;
    border-bottom: 3px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .logo {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 600;
    white-space: nowrap;
  }

  .logo span { color: var(--gold); }

  .level-pills {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .pill {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid transparent;
    background: transparent;
    color: rgba(255, 255, 255, .64);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
  }

  .pill.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy);
  }

  .tabs {
    min-height: 48px;
    padding: 0 clamp(1.25rem, 3vw, 2.75rem);
    border-bottom: 1px solid var(--border);
    background: #fff;
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }

  .tab {
    padding: 14px 18px 12px;
    border: 0;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    white-space: nowrap;
  }

  .tab.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
    font-weight: 600;
  }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 66px);
  }

  .sidebar {
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 1rem 0;
  }

  .sid-section { margin-bottom: .65rem; }

  .sid-head {
    padding: .55rem 1.2rem;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .sid-item {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    padding: 10px 1.2rem;
    border: 0;
    border-left: 3px solid transparent;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    text-align: left;
  }

  .sid-item.active {
    background: var(--blue-light);
    border-left-color: var(--blue);
    color: var(--blue);
    font-weight: 600;
  }

  .sid-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex: 0 0 8px;
  }

  .dot-blue { background: var(--blue); }
  .dot-purple { background: var(--purple); }
  .dot-teal { background: var(--teal); }
  .dot-gold { background: var(--gold); }

  .main {
    background: var(--bg);
    padding: clamp(1.25rem, 3vw, 2.75rem);
  }

  .intro {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: clamp(1.5rem, 3vw, 2.4rem);
    margin-bottom: 1.25rem;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .11em;
    text-transform: uppercase;
    margin-bottom: .55rem;
  }

  .eyebrow::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold);
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: clamp(34px, 4.5vw, 56px);
    line-height: 1.12;
    margin-bottom: .55rem;
    color: var(--navy);
  }

  .intro p {
    max-width: 900px;
    color: var(--muted);
    font-size: 18px;
    line-height: 1.7;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-top: 1.4rem;
  }

  .stat {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    background: #fbfaf7;
  }

  .stat strong {
    display: block;
    color: var(--navy);
    font-size: 24px;
    margin-bottom: 2px;
  }

  .stat span {
    color: var(--muted);
    font-size: 14px;
  }

  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin: 1.6rem 0 .9rem;
  }

  .section-title h2 {
    color: var(--navy);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .section-title span {
    color: var(--muted);
    font-size: 14px;
  }

  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.25rem;
  }

  .lesson-card,
  .panel {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .lesson-head {
    padding: 1.35rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: .55rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    min-height: 26px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-b2 { background: var(--gold-light); color: #7a5210; }
  .badge-tech { background: var(--purple-light); color: var(--purple); }
  .badge-live { background: var(--green-light); color: var(--green); }

  .lesson-title {
    font-family: 'Lora', serif;
    color: var(--navy);
    font-size: clamp(28px, 2.6vw, 38px);
    font-weight: 600;
    margin-bottom: .25rem;
  }

  .lesson-desc {
    color: var(--muted);
    font-size: 16px;
    line-height: 1.6;
  }

  .lesson-body {
    padding: 1.35rem 1.5rem 1.5rem;
  }

  .lesson-features {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 1.2rem;
  }

  .feature {
    display: block;
    min-height: 72px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid rgba(26, 39, 68, .08);
    padding: .9rem 1rem;
  }

  .feature strong {
    display: block;
    font-size: 16px;
    margin-bottom: 1px;
  }

  .feature span {
    color: var(--muted);
    font-size: 14px;
  }

  .open-lesson {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 10px 20px;
    border-radius: 8px;
    background: var(--navy);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    transition: background .15s, transform .15s;
  }

  .open-lesson:hover {
    background: var(--blue);
    transform: translateY(-1px);
  }

  .empty-state {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 16px;
    padding: 1.5rem;
  }

  .collection-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1rem;
  }

  .collection-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
  }

  .collection-card h3 {
    color: var(--navy);
    font-family: 'Lora', serif;
    font-size: 24px;
    line-height: 1.2;
    margin: .5rem 0 .35rem;
  }

  .collection-card p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.55;
    margin-bottom: 1rem;
  }

  .test-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 1rem;
  }

  .test-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
  }

  .test-card h3 {
    color: var(--navy);
    font-family: 'Lora', serif;
    font-size: 26px;
    margin: .5rem 0 .75rem;
  }

  .quiz-question {
    border-top: 1px solid var(--border);
    padding: 1rem 0;
  }

  .quiz-question p {
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: .6rem;
  }

  .quiz-option {
    display: block;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    line-height: 1.6;
    margin: .35rem 0;
  }

  .quiz-option input {
    margin-right: .45rem;
  }

  .quiz-result {
    display: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    margin-top: .8rem;
    padding: .75rem .9rem;
  }

  .quiz-result.show {
    display: block;
  }

  .quiz-result.ok {
    background: var(--green-light);
    color: var(--green);
  }

  .quiz-result.err {
    background: var(--gold-light);
    color: #7a5210;
  }

  .panel {
    padding: 1.25rem;
  }

  .panel h3 {
    color: var(--navy);
    font-size: 17px;
    margin-bottom: .8rem;
  }

  .track-list {
    display: grid;
    gap: 10px;
  }

  .track-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fbfaf7;
    padding: .9rem 1rem;
    font-size: 15px;
  }

  .track-item small {
    color: var(--muted);
    font-size: 13px;
  }

  .soon {
    color: var(--muted);
    font-size: 14px;
  }

  .coming-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
  }

  .coming-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.15rem;
    min-height: 150px;
  }

  .coming-card .badge { margin-bottom: .7rem; }

  .coming-card h3 {
    color: var(--navy);
    font-size: 18px;
    margin-bottom: .35rem;
  }

  .coming-card p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
  }

  .footer {
    padding: 1.4rem clamp(1.25rem, 3vw, 2.75rem);
    border-top: 1px solid var(--border);
    color: var(--muted);
    background: #fff;
    font-size: 14px;
    text-align: center;
  }

  @media (max-width: 1100px) {
    .lesson-grid {
      grid-template-columns: 1fr;
    }

    .coming-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 760px) {
    .shell { border: none; }
    .topbar {
      align-items: flex-start;
      flex-direction: column;
      padding: 1rem;
    }
    .level-pills { justify-content: flex-start; }
    .tabs { padding: 0 1rem; }
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 1rem; }
    .stats,
    .lesson-grid,
    .coming-grid,
    .lesson-features {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="logo" href="index.html">Română<span>StepByStep</span></a>
      <nav class="level-pills" id="topLevels" aria-label="Niveluri"></nav>
    </header>

    <div class="layout">
      <aside class="sidebar" aria-label="Meniu lecții">
        <div class="sid-section">
          <div class="sid-head">Lecții</div>
          <div id="lessonMenu"></div>
        </div>
        <div class="sid-section">
          <div class="sid-head">Test de nivel</div>
          <div id="levelTestMenu"></div>
        </div>
      </aside>

      <main class="main" id="app"></main>
    </div>

    <footer class="footer">
      Română Step by Step · Catalog automat pentru lecții și teste
    </footer>
  </div>

<script>
const LEVELS = [
  { key: 'home', label: 'Home', dot: 'dot-blue' },
  { key: 'A1', label: 'A1 Începător', dot: 'dot-gold' },
  { key: 'A2', label: 'A2 Elementar', dot: 'dot-teal' },
  { key: 'B1', label: 'B1 Intermediar', dot: 'dot-purple' },
  { key: 'B2', label: 'B2 Avansat', dot: 'dot-blue' },
  { key: 'C1', label: 'C1 Avansat+', dot: 'dot-purple' }
];

const LESSONS = [
  {
    id: 'a1-tehnologie',
    level: 'A1',
    topic: 'Tehnologie',
    title: 'Tehnologie și Dispozitive',
    description: 'O lecție pentru începători despre telefoane, laptopuri, aplicații, internet și verbe simple de zi cu zi.',
    path: 'lessons/a1/tehnologie.html',
    fallbackSections: [
      { key: 'vocab', category: 'vocabular', title: 'Vocabular — Primele cuvinte', description: 'Dispozitive, accesorii și cuvinte de bază în tehnologie' },
      { key: 'verbe', category: 'gramatica', title: 'Verbe esențiale', description: 'Verbe de bază pentru a vorbi despre tehnologie' },
      { key: 'text', category: 'lectura', title: 'Text scurt + Întrebări', description: 'Text simplu cu întrebări de înțelegere' },
      { key: 'exercitii', category: 'exercitii', title: 'Exerciții A1', description: 'Exerciții interactive din lecție' },
      { key: 'conversatie', category: 'conversatie', title: 'Conversație', description: 'Întrebări simple și roluri' },
      { key: 'teme', category: 'teme', title: 'Teme de discutat', description: 'Scriere scurtă și conversație' }
    ],
    test: [
      { q: 'Cum se spune „the phone” în română?', options: ['telefonul', 'routerul', 'căștile'], answer: 0 },
      { q: 'Completează: Eu ___ un mesaj de la mama.', options: ['văd', 'primesc', 'stau'], answer: 1 },
      { q: 'Ce folosești pentru a asculta muzică?', options: ['căștile', 'imprimanta', 'routerul'], answer: 0 },
      { q: 'Care verb înseamnă „to send”?', options: ['a trimite', 'a încărca', 'a vedea'], answer: 0 }
    ]
  },
  {
    id: 'b2-tehnologie',
    level: 'B2',
    topic: 'Tehnologie',
    title: 'Comunicare și Tehnologie',
    description: 'O lecție completă despre aplicații, inteligență artificială, securitate cibernetică, muncă remote și rețele sociale.',
    path: 'lessons/b2/tehnologie.html',
    fallbackSections: [
      { key: 'vocab', category: 'vocabular', title: 'Vocabular esențial', description: 'Termeni digitali și expresii utile' },
      { key: 'gramatica', category: 'gramatica', title: 'Verbe și gramatică', description: 'Conjunctiv, pasiv, condițional și gerunziu' },
      { key: 'text', category: 'lectura', title: 'Text de lectură', description: 'Text B2 despre tehnologia digitală' },
      { key: 'exercitii', category: 'exercitii', title: 'Exerciții interactive', description: 'Vocabular, gramatică și transformări' },
      { key: 'conversatie', category: 'conversatie', title: 'Conversație și dezbatere', description: 'Avantaje, dezavantaje și opinii' },
      { key: 'teme', category: 'teme', title: 'Teme de discutat', description: 'Eseu și dezbatere în grup' }
    ],
    test: [
      { q: 'Ce verb înseamnă „to update”?', options: ['a actualiza', 'a partaja', 'a stoca'], answer: 0 },
      { q: 'Care este un risc menționat în lecție?', options: ['atacurile informatice', 'lipsa dicționarelor', 'transportul public'], answer: 0 },
      { q: 'Alege construcția pasivă corectă.', options: ['Datele sunt salvate automat.', 'Eu salvez datele.', 'Salvând datele, lucrez.'], answer: 0 },
      { q: 'Ce competențe sunt tot mai căutate pe piața muncii?', options: ['competențele digitale', 'competențele sportive', 'competențele culinare'], answer: 0 }
    ]
  }
];

const LEVEL_TESTS = {
  A1: [
    { q: 'Alege propoziția corectă.', options: ['Eu primesc un mesaj.', 'Eu primit un mesaj.', 'Eu primește un mesaj.'], answer: 0 },
    { q: 'Ce cuvânt este un dispozitiv?', options: ['laptopul', 'repede', 'ieri'], answer: 0 },
    { q: 'Completează: Telefonul are ___.', options: ['baterie', 'fereastră', 'scaun'], answer: 0 },
    { q: 'Care verb înseamnă „to listen”?', options: ['a asculta', 'a vedea', 'a posta'], answer: 0 }
  ],
  A2: [
    { q: 'Alege forma corectă: Ieri eu ___ un mesaj.', options: ['am trimis', 'trimit', 'trimite'], answer: 0 },
    { q: 'Care expresie cere ajutor?', options: ['Mă poți ajuta?', 'Îmi place cafeaua.', 'Este luni.'], answer: 0 },
    { q: 'Alege varianta potrivită: Aplicația este ___ decât înainte.', options: ['mai rapidă', 'rapid', 'repede'], answer: 0 },
    { q: 'Care este un cuvânt legat de internet?', options: ['parolă', 'furculiță', 'grădină'], answer: 0 }
  ],
  B1: [
    { q: 'Alege conectorul pentru cauză.', options: ['pentru că', 'deși', 'totuși'], answer: 0 },
    { q: 'Care propoziție exprimă o opinie?', options: ['Cred că tehnologia ajută.', 'Telefonul este pe masă.', 'Este ora opt.'], answer: 0 },
    { q: 'Alege forma corectă.', options: ['Dacă aș avea timp, aș învăța.', 'Dacă am timp, am învățat.', 'Dacă aveam timp, voi învăța.'], answer: 0 },
    { q: 'Care cuvânt este sinonim cu „a distribui”?', options: ['a partaja', 'a șterge', 'a opri'], answer: 0 }
  ],
  B2: [
    { q: 'Alege conectorul potrivit pentru contrast.', options: ['deși', 'deoarece', 'prin urmare'], answer: 0 },
    { q: 'Care formulare este potrivită pentru opinie?', options: ['Sunt de părere că...', 'Pe masă este...', 'La ora trei...'], answer: 0 },
    { q: 'Ce înseamnă „securitate cibernetică”?', options: ['protecția sistemelor digitale', 'vânzarea de telefoane', 'încărcarea bateriei'], answer: 0 },
    { q: 'Alege propoziția cu pasiv.', options: ['Datele sunt salvate automat.', 'Eu salvez datele.', 'Salvez rapid.'], answer: 0 }
  ],
  C1: [
    { q: 'Alege formularea cea mai academică.', options: ['Este incontestabil că digitalizarea influențează educația.', 'Telefonul e super tare.', 'Îmi place netul.'], answer: 0 },
    { q: 'Care structură introduce o concesie?', options: ['Cu toate că', 'Prin urmare', 'În concluzie'], answer: 0 },
    { q: 'Alege termenul potrivit pentru „data privacy”.', options: ['confidențialitatea datelor', 'viteza ecranului', 'luminozitatea parolei'], answer: 0 },
    { q: 'Care propoziție este nuanțată argumentativ?', options: ['Beneficiile sunt evidente, însă riscurile nu pot fi ignorate.', 'Am telefon.', 'Internetul merge.'], answer: 0 }
  ]
};

const SECTION_CATEGORY = {
  vocab: 'vocabular',
  vocabular: 'vocabular',
  verbe: 'gramatica',
  gramatica: 'gramatica',
  text: 'lectura',
  lectura: 'lectura',
  exercitii: 'exercitii',
  conversatie: 'conversatie',
  teme: 'teme',
  test: 'test'
};

let catalog = LESSONS.map(lesson => ({ ...lesson, sections: lesson.fallbackSections }));
let state = { level: 'home' };

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  }[char]));
}

function sectionLink(lesson, section) {
  return `${lesson.path}#${section.key}`;
}

function getFilteredLessons() {
  return state.level === 'home' ? catalog : catalog.filter(lesson => lesson.level === state.level);
}

function getAvailableLevels() {
  return new Set(catalog.map(lesson => lesson.level));
}

async function hydrateCatalog() {
  const parser = new DOMParser();
  const loaded = await Promise.all(LESSONS.map(async lesson => {
    try {
      const response = await fetch(lesson.path);
      if (!response.ok) throw new Error('Lecția nu a putut fi citită.');
      const html = await response.text();
      const doc = parser.parseFromString(html, 'text/html');
      const title = doc.querySelector('main .header h1, h1')?.textContent.trim() || lesson.title;
      const sections = Array.from(doc.querySelectorAll('.section[id^="sec-"]')).map(section => {
        const key = section.id.replace('sec-', '');
        const header = section.querySelector('.section-header');
        return {
          key,
          category: SECTION_CATEGORY[key] || key,
          title: header?.querySelector('h2')?.textContent.trim() || key,
          description: header?.querySelector('p')?.textContent.trim() || lesson.description
        };
      });
      return { ...lesson, title, sections: sections.length ? sections : lesson.fallbackSections };
    } catch (error) {
      return { ...lesson, sections: lesson.fallbackSections };
    }
  }));
  catalog = loaded;
  render();
}

function setLevel(level) {
  state.level = level;
  render();
}

function renderTopNav() {
  document.getElementById('topLevels').innerHTML = LEVELS.map(level => `
    <button class="pill ${state.level === level.key ? 'active' : ''}" type="button" onclick="setLevel('${level.key}')">${escapeHtml(level.key === 'home' ? 'Home' : level.key)}</button>
  `).join('');
}

function renderSidebar() {
  const lessons = getFilteredLessons();
  document.getElementById('lessonMenu').innerHTML = lessons.length ? lessons.map(lesson => `
    <a class="sid-item" href="${lesson.path}">
      <span class="sid-dot dot-blue"></span>${escapeHtml(lesson.level)} · ${escapeHtml(lesson.title)}
    </a>
  `).join('') : '<div class="empty-state">Nu există lecții.</div>';

  if (state.level === 'home') {
    document.getElementById('levelTestMenu').innerHTML = LEVELS
      .filter(level => level.key !== 'home' && LEVEL_TESTS[level.key])
      .map(level => `<button class="sid-item" type="button" onclick="setLevel('${level.key}')"><span class="sid-dot dot-gold"></span>Test general ${level.key}</button>`)
      .join('');
    return;
  }

  document.getElementById('levelTestMenu').innerHTML = LEVEL_TESTS[state.level]
    ? `<button class="sid-item" type="button" onclick="renderLevelTest('${state.level}')"><span class="sid-dot dot-gold"></span>Test general ${state.level}</button>`
    : '<div class="empty-state">Testul general nu este încă disponibil.</div>';
}

function renderIntro(lessons) {
  const heading = state.level === 'home' ? 'Română Step by Step' : `Nivel ${state.level}`;
  const subline = state.level === 'home' ? 'Lecții disponibile' : `${lessons.length} lecții disponibile`;
  return `
    <section class="intro">
      <div class="eyebrow">${escapeHtml(subline)}</div>
      <h1>${escapeHtml(heading)}</h1>
      <div class="stats" aria-label="Rezumat">
        <div class="stat"><strong>${lessons.length}</strong><span>lecții</span></div>
        <div class="stat"><strong>${state.level === 'home' ? [...new Set(catalog.map(lesson => lesson.level))].join(' · ') : state.level}</strong><span>nivel</span></div>
        <div class="stat"><strong>${state.level === 'home' ? Object.keys(LEVEL_TESTS).length : (LEVEL_TESTS[state.level] ? 1 : 0)}</strong><span>teste generale</span></div>
      </div>
    </section>
  `;
}

function renderLessonCard(lesson) {
  const features = lesson.sections.slice(0, 4).map(section => `
    <a class="feature" href="${sectionLink(lesson, section)}">
      <strong>${escapeHtml(section.title)}</strong>
      <span>${escapeHtml(section.category)}</span>
    </a>
  `).join('');
  return `
    <article class="lesson-card">
      <div class="lesson-head">
        <div class="meta">
          <span class="badge badge-b2">Nivel ${escapeHtml(lesson.level)}</span>
          <span class="badge badge-tech">${escapeHtml(lesson.topic)}</span>
          <span class="badge badge-live">Activă</span>
        </div>
        <div class="lesson-title">${escapeHtml(lesson.title)}</div>
        <p class="lesson-desc">${escapeHtml(lesson.description)}</p>
      </div>
      <div class="lesson-body">
        <div class="lesson-features">${features}</div>
        <a class="open-lesson" href="${lesson.path}">Deschide lecția</a>
      </div>
    </article>
  `;
}

function renderLessons(lessons) {
  return `
    <section>
      <div class="section-title">
        <h2>Lecții disponibile</h2>
        <span>${lessons.length} rezultate</span>
      </div>
      ${lessons.length ? `<div class="lesson-grid">${lessons.map(renderLessonCard).join('')}</div>` : '<div class="empty-state">Nu există încă lecții pentru nivelul selectat.</div>'}
    </section>
  `;
}

function renderLessonTests(lessons) {
  const withTests = lessons.filter(lesson => lesson.test && lesson.test.length);
  return `
    <section>
      <div class="section-title">
        <h2>Teste de verificare din lecții</h2>
        <span>${withTests.length} teste</span>
      </div>
      ${withTests.length ? `<div class="test-grid">${withTests.map(renderTestCard).join('')}</div>` : '<div class="empty-state">Nu există teste pentru nivelul selectat.</div>'}
    </section>
  `;
}

function renderTestCard(lesson) {
  const questions = lesson.test.map((item, index) => `
    <div class="quiz-question">
      <p>${index + 1}. ${escapeHtml(item.q)}</p>
      ${item.options.map((option, optionIndex) => `
        <label class="quiz-option">
          <input type="radio" name="${lesson.id}-q${index}" value="${optionIndex}">
          ${escapeHtml(option)}
        </label>
      `).join('')}
    </div>
  `).join('');
  return `
    <article class="test-card" id="test-${lesson.id}">
      <div class="meta">
        <span class="badge badge-b2">Nivel ${escapeHtml(lesson.level)}</span>
        <span class="badge badge-tech">${escapeHtml(lesson.topic)}</span>
      </div>
      <h3>Test final · ${escapeHtml(lesson.title)}</h3>
      ${questions}
      <button class="open-lesson" type="button" onclick="checkTest('${lesson.id}')">Verifică testul</button>
      <div class="quiz-result" id="result-${lesson.id}"></div>
    </article>
  `;
}

function renderLevelTestCard(level) {
  const questions = LEVEL_TESTS[level] || [];
  const items = questions.map((item, index) => `
    <div class="quiz-question">
      <p>${index + 1}. ${escapeHtml(item.q)}</p>
      ${item.options.map((option, optionIndex) => `
        <label class="quiz-option">
          <input type="radio" name="level-${level}-q${index}" value="${optionIndex}">
          ${escapeHtml(option)}
        </label>
      `).join('')}
    </div>
  `).join('');
  return `
    <section>
      <div class="section-title">
        <h2>Test general ${escapeHtml(level)}</h2>
        <span>${questions.length} întrebări</span>
      </div>
      <article class="test-card">
        <h3>Test de nivel · ${escapeHtml(level)}</h3>
        ${items}
        <button class="open-lesson" type="button" onclick="checkLevelTest('${level}')">Verifică testul</button>
        <div class="quiz-result" id="result-level-${level}"></div>
      </article>
    </section>
  `;
}

function checkTest(lessonId) {
  const lesson = catalog.find(item => item.id === lessonId);
  if (!lesson) return;
  let score = 0;
  lesson.test.forEach((question, index) => {
    const selected = document.querySelector(`input[name="${lesson.id}-q${index}"]:checked`);
    if (selected && Number(selected.value) === question.answer) score++;
  });
  const result = document.getElementById(`result-${lesson.id}`);
  result.className = `quiz-result show ${score === lesson.test.length ? 'ok' : 'err'}`;
  result.textContent = score === lesson.test.length
    ? `Perfect: ${score}/${lesson.test.length}.`
    : `Ai ${score}/${lesson.test.length}. Recitește lecția și încearcă din nou.`;
}

function checkLevelTest(level) {
  const questions = LEVEL_TESTS[level] || [];
  let score = 0;
  questions.forEach((question, index) => {
    const selected = document.querySelector(`input[name="level-${level}-q${index}"]:checked`);
    if (selected && Number(selected.value) === question.answer) score++;
  });
  const result = document.getElementById(`result-level-${level}`);
  result.className = `quiz-result show ${score === questions.length ? 'ok' : 'err'}`;
  result.textContent = score === questions.length
    ? `Perfect: ${score}/${questions.length}.`
    : `Ai ${score}/${questions.length}.`;
}

function renderLevelTest(level) {
  state.level = level;
  renderTopNav();
  renderSidebar();
  document.getElementById('app').innerHTML = renderIntro(getFilteredLessons()) + renderLevelTestCard(level);
}

function render() {
  const lessons = getFilteredLessons();
  renderTopNav();
  renderSidebar();
  let content = renderIntro(lessons) + renderLessons(lessons);
  if (state.level !== 'home' && LEVEL_TESTS[state.level]) content += renderLevelTestCard(state.level);
  content += renderLessonTests(lessons);
  document.getElementById('app').innerHTML = content;
}

render();
hydrateCatalog();
</script>
</body>
</html>
