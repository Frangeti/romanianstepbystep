<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards · Romanian Step by Step</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1d1d1f;
    --muted: #6e6e73;
    --paper: #ffffff;
    --bg: #f5f5f7;
    --mist: #f5f5f7;
    --sky: #0071e3;
    --border: #d2d2d7;
    --shadow: 0 22px 58px rgba(0, 0, 0, 0.12);
    --shadow-sm: 0 8px 26px rgba(0, 0, 0, 0.06);
    --level-a1: rgba(217, 79, 69, .74);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 18px;
    background: linear-gradient(180deg, #ffffff 0%, var(--bg) 38%, #efeff1 100%);
    color: var(--navy);
    line-height: 1.6;
  }

  a { color: inherit; text-decoration: none; }

  button { font: inherit; }

  .topbar {
    min-height: 76px;
    padding: 0 clamp(1.1rem, 3vw, 3.5rem);
    background: rgba(255, 255, 255, .94);
    border-bottom: 1px solid rgba(220, 230, 237, .9);
    box-shadow: 0 10px 28px rgba(0, 0, 0, .07);
    backdrop-filter: blur(14px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .logo {
    font-size: clamp(20px, 2vw, 25px);
    white-space: nowrap;
  }

  .logo span { color: var(--sky); }

  .main-nav {
    display: flex;
    flex: 1;
    align-items: center;
    justify-content: flex-end;
    gap: 5px;
    flex-wrap: wrap;
  }

  .main-nav-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 36px;
    padding: 7px 11px;
    border: 1px solid transparent;
    border-radius: 8px;
    background: transparent;
    color: var(--navy);
    cursor: pointer;
    font-size: 13px;
    transition: background .18s, border-color .18s, color .18s, transform .18s;
  }

  .main-nav-link:hover {
    border-color: var(--border);
    background: var(--mist);
    transform: translateY(-1px);
  }

  .main-nav-link.active {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
  }

  main {
    --level-color: var(--level-a1);
    padding: 1.05rem clamp(1.1rem, 3vw, 3rem) clamp(1.1rem, 3vw, 3rem);
  }

  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 1rem;
    margin-bottom: 1.4rem;
  }

  .lesson-grid.is-hidden {
    display: none;
  }

  .lesson-card {
    min-height: 132px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    padding: 0;
    border: 1px solid rgba(210, 210, 215, .86);
    border-radius: 8px;
    background:
      linear-gradient(145deg, rgba(255, 255, 255, .9), rgba(245, 245, 247, .76)),
      linear-gradient(145deg, color-mix(in srgb, var(--level-color) 18%, transparent), rgba(255, 255, 255, .92));
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    text-align: center;
    transition: border-color .18s, box-shadow .18s, transform .18s;
  }

  .lesson-card::before {
    content: attr(data-lesson-no);
    position: absolute;
    top: .75rem;
    right: .75rem;
    z-index: 4;
    min-width: 36px;
    height: 30px;
    display: grid;
    place-items: center;
    padding: 0 .45rem;
    border: 1px solid color-mix(in srgb, var(--level-color) 26%, white);
    border-radius: 9px;
    background: rgba(255, 255, 255, .76);
    color: color-mix(in srgb, var(--level-color) 84%, var(--navy));
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .02em;
    box-shadow: 0 8px 18px rgba(0, 0, 0, .055);
    backdrop-filter: blur(12px);
  }

  .lesson-card:hover,
  .lesson-card.is-active {
    border-color: color-mix(in srgb, var(--level-color) 58%, white);
    box-shadow: var(--shadow);
    transform: translateY(-2px);
  }

  .lesson-card.is-active {
    outline: 2px solid color-mix(in srgb, var(--level-color) 55%, white);
    outline-offset: 2px;
  }

  .lesson-head {
    width: 100%;
    padding: 1.2rem;
    text-align: center;
  }

  .lesson-title {
    display: grid;
    gap: .35rem;
    margin: 0;
    color: var(--navy);
    font-size: clamp(21px, 1.8vw, 28px);
    line-height: 1.18;
  }

  .lesson-name,
  .lesson-translation { display: block; }

  .lesson-name { font-weight: 400; }

  .lesson-translation {
    color: color-mix(in srgb, var(--level-color) 82%, var(--navy));
    font-size: clamp(13px, 1vw, 15px);
    font-weight: 400;
    line-height: 1.25;
  }

  .flashcard-panel {
    display: none;
    gap: 1.45rem;
    max-width: 460px;
    margin: 0 auto;
    padding: 0;
    background: transparent;
    box-shadow: none;
  }

  .flashcard-panel.is-visible {
    display: grid;
  }

  .deck-switcher {
    display: flex;
    justify-content: center;
    gap: .55rem;
    flex-wrap: wrap;
    margin: 0 auto 1.35rem;
  }

  .deck-chip {
    min-height: 38px;
    padding: 7px 14px;
    border: 1px solid rgba(210, 210, 215, .9);
    border-radius: 999px;
    background: rgba(255, 255, 255, .82);
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    transition: background .18s, border-color .18s, color .18s, transform .18s;
  }

  .deck-chip:hover {
    border-color: color-mix(in srgb, var(--level-color) 42%, white);
    color: var(--navy);
    transform: translateY(-1px);
  }

  .deck-chip.is-active {
    border-color: color-mix(in srgb, var(--level-color) 52%, white);
    background: color-mix(in srgb, var(--level-color) 13%, white);
    color: color-mix(in srgb, var(--level-color) 82%, var(--navy));
  }

  .flashcard-meta {
    display: grid;
    gap: .25rem;
    padding: 0;
    background: transparent;
    box-shadow: none;
    text-align: center;
    min-width: 0;
  }

  .deck-title {
    color: var(--navy);
    font-size: 16px;
    font-weight: 400;
    line-height: 1.2;
    overflow-wrap: anywhere;
  }

  .flashcard-nav {
    display: grid;
    grid-template-columns: 1fr;
    align-items: center;
    gap: .75rem;
    min-height: 46px;
  }

  .nav-text-btn {
    min-height: 36px;
    border: 0;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
  }

  .nav-text-btn:hover {
    color: #0066cc;
  }

  .flip-card {
    display: block;
    width: 100%;
    min-height: 430px;
    border: 1px solid rgba(210, 210, 215, .9);
    border-radius: 8px;
    background: #fff;
    color: inherit;
    box-shadow: 0 18px 44px rgba(0, 0, 0, .1);
    cursor: pointer;
    overflow: visible;
    touch-action: pan-y;
    transition: transform .22s ease, opacity .22s ease;
    user-select: none;
  }

  .flip-card.is-dragging {
    transition: none;
  }

  .flip-card.is-swiping-left {
    opacity: 0;
    transform: translateX(-130%) rotate(-12deg);
  }

  .flip-card.is-swiping-right {
    opacity: 0;
    transform: translateX(130%) rotate(12deg);
  }

  .flip-card.is-entering {
    animation: cardEnter .22s ease both;
  }

  @keyframes cardEnter {
    from {
      opacity: 0;
      transform: translateY(14px) scale(.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .flip-inner {
    display: block;
    width: 100%;
    min-height: 430px;
  }

  .flip-face {
    min-height: 430px;
    display: flex;
    flex-direction: column;
    gap: .85rem;
    padding: 1rem;
    background: #fff;
  }

  .flip-front {
    border-top: 6px solid color-mix(in srgb, var(--level-color) 72%, white);
    background: #ffffff;
  }

  .flip-back {
    border-top: 6px solid var(--sky);
    background: #ffffff;
  }

  .flip-card .flip-back {
    display: none;
  }

  .flip-card.is-flipped .flip-front {
    display: none;
  }

  .flip-card.is-flipped .flip-back {
    display: flex;
  }

  .flip-back {
    transform: none;
  }

  .flashcard-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .5rem;
  }

  .flashcard-number {
    min-width: 38px;
    min-height: 32px;
    display: inline-grid;
    place-items: center;
    padding: 0 .55rem;
    border: 1px solid color-mix(in srgb, var(--level-color) 28%, white);
    border-radius: 9px;
    background: #ffffff;
    color: color-mix(in srgb, var(--level-color) 84%, var(--navy));
    font-size: 13px;
    box-shadow: 0 8px 18px rgba(0, 0, 0, .055);
  }

  .language-pill {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 4px 10px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--sky) 10%, white);
    color: var(--sky);
    font-size: 13px;
  }

  .card-content {
    display: flex;
    flex: 1;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: .75rem;
    min-height: 300px;
    padding: .9rem;
    overflow: visible;
    border-radius: 8px;
    border: 1px solid rgba(210, 210, 215, .86);
    background: #ffffff;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .7), 0 10px 26px rgba(0, 0, 0, .06);
    text-align: center;
  }

  .card-content .card-side-label {
    display: none;
  }

  .flip-front .card-content {
    background: color-mix(in srgb, var(--level-color) 7%, white);
  }

  .flip-back .card-content {
    background: color-mix(in srgb, var(--sky) 7%, white);
  }

  .card-side-label {
    width: fit-content;
    justify-self: center;
    min-height: 26px;
    padding: 4px 10px;
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .flip-front .card-side-label {
    background: color-mix(in srgb, var(--level-color) 86%, var(--navy));
  }

  .flip-back .card-side-label {
    background: var(--sky);
  }

  .card-word {
    display: block;
    min-width: 0;
    max-width: 100%;
    color: var(--navy);
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 400;
    line-height: 1.18;
    overflow: visible;
    overflow-wrap: break-word;
    word-break: normal;
    hyphens: auto;
    text-wrap: balance;
    white-space: normal;
  }

  .audio-btn {
    width: 44px;
    height: 44px;
    display: inline-grid;
    place-items: center;
    border: 1px solid rgba(210, 210, 215, .9);
    border-radius: 50%;
    background: #fff;
    color: var(--sky);
    cursor: pointer;
    font-size: 18px;
    box-shadow: var(--shadow-sm);
  }

  .audio-btn:hover {
    border-color: rgba(0, 113, 227, .28);
    background: color-mix(in srgb, var(--sky) 7%, white);
  }

  .flip-back .card-word {
    color: color-mix(in srgb, var(--sky) 82%, var(--navy));
  }

  .flip-card.has-long-text .card-word {
    font-size: clamp(20px, 4vw, 30px);
    line-height: 1.22;
  }

  .flip-card.has-very-long-text .card-word {
    font-size: clamp(17px, 3.2vw, 23px);
    line-height: 1.25;
  }

  .card-hint {
    display: none;
    width: fit-content;
    justify-self: center;
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, .82);
    color: var(--muted);
    font-size: 15px;
  }

  .flashcard-controls {
    display: grid;
    grid-template-columns: 44px 1fr 44px;
    align-items: center;
    gap: .75rem;
  }

  .arrow-btn {
    width: 44px;
    height: 44px;
    border: 1px solid rgba(210, 210, 215, .9);
    border-radius: 50%;
    background: #fff;
    color: var(--navy);
    cursor: pointer;
    font-size: 24px;
    line-height: 1;
    box-shadow: var(--shadow-sm);
  }

  .arrow-btn:hover {
    border-color: rgba(0, 113, 227, .28);
    color: var(--sky);
  }

  .card-counter {
    justify-self: center;
    color: var(--muted);
    font-size: 14px;
  }

  .flashcard-footer {
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    align-self: center;
    border: 1px solid rgba(210, 210, 215, .86);
    border-radius: 50%;
    background: #fff;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
  }

  @media (max-width: 860px) {
    .topbar {
      position: static;
      align-items: flex-start;
      flex-direction: column;
      padding: 1rem;
    }

    .main-nav { justify-content: flex-start; }
    .flip-card,
    .flip-inner {
      min-height: 390px;
    }

    .card-word {
      font-size: clamp(21px, 7vw, 32px);
    }
  }
</style>
</head>
<body>
  <header class="topbar">
    <a class="logo" href="index.html#a1">Romanian <span>Step by Step</span></a>
    <nav class="main-nav" aria-label="Meniu principal">
      <a class="main-nav-link" href="index.html#acasa">Română</a>
      <a class="main-nav-link" href="index.html#a1-germana">Germană</a>
      <a class="main-nav-link" href="index.html#a1-engleza">Engleză</a>
      <a class="main-nav-link" href="index.html#a1-spaniola">Spaniolă</a>
      <a class="main-nav-link active" href="flashcards.html">Flashcards</a>
      <button class="main-nav-link login-link" type="button">Login</button>
    </nav>
  </header>

  <main>
    <div class="deck-switcher" aria-label="Alege lecția">
      <button class="deck-chip is-active" type="button" data-deck="0">Lecția 1</button>
      <button class="deck-chip" type="button" data-deck="1">Lecția 2</button>
      <button class="deck-chip" type="button" data-deck="2">Lecția 3</button>
    </div>

    <section class="flashcard-panel is-visible" aria-label="Flashcard vocabular germană A1">
      <div class="flashcard-nav">
        <div class="flashcard-meta">
          <strong class="deck-title" id="deckTitle"></strong>
        </div>
      </div>

      <div class="flip-card" id="flipCard" role="button" tabindex="0" aria-label="Întoarce flashcardul">
        <span class="flip-inner">
          <span class="flip-face flip-front">
            <span class="flashcard-top">
              <span class="flashcard-number" id="frontNumber"></span>
              <span class="language-pill">Română</span>
            </span>
            <span class="card-content">
              <span class="card-word" id="frontWord"></span>
              <button class="audio-btn" data-audio-side="front" type="button" aria-label="Ascultă cuvântul">▶</button>
              <span class="card-hint">Click pentru traducerea în germană</span>
            </span>
            <span class="flashcard-footer" aria-label="Întoarce cardul">↻</span>
          </span>
          <span class="flip-face flip-back">
            <span class="flashcard-top">
              <span class="flashcard-number" id="backNumber"></span>
              <span class="language-pill">Germană</span>
            </span>
            <span class="card-content">
              <span class="card-word" id="backWord"></span>
              <button class="audio-btn" data-audio-side="back" type="button" aria-label="Ascultă cuvântul">▶</button>
              <span class="card-hint">Click pentru cuvântul în română</span>
            </span>
            <span class="flashcard-footer" aria-label="Întoarce cardul">↻</span>
          </span>
        </span>
      </div>

      <div class="flashcard-controls">
        <button class="arrow-btn" id="prevCard" type="button" aria-label="Cardul anterior">‹</button>
        <span class="card-counter" id="cardCounter"></span>
        <button class="arrow-btn" id="nextCard" type="button" aria-label="Cardul următor">›</button>
      </div>
    </section>
  </main>

  <script>
    const decks = [
      {
        title: 'Lecția 01 · Salutări',
        cards: [
          ['Bună!', 'Hallo!'],
          ['Salut!', 'Grüß dich!'],
          ['Bună dimineața!', 'Guten Morgen!'],
          ['Bună ziua!', 'Guten Tag!'],
          ['Bună seara!', 'Guten Abend!'],
          ['Noapte bună!', 'Gute Nacht!'],
          ['O zi bună!', 'Einen schönen Tag!'],
          ['O seară bună!', 'Einen schönen Abend!'],
          ['Pa!', 'Tschüss!'],
          ['Pa pa!', 'Tschüssi!'],
          ['La revedere!', 'Auf Wiedersehen!'],
          ['Pe curând!', 'Bis bald!'],
          ['Pe mâine!', 'Bis morgen!'],
          ['Servus!', 'Servus!'],
          ['Ciao!', 'Ciao!'],
          ['Salutare!', 'Hallo!'],
          ['Pe săptămâna viitoare!', 'Bis nächste Woche!'],
          ['Weekend plăcut!', 'Schönes Wochenende!'],
          ['O săptămână frumoasă!', 'Schöne Woche!'],
          ['Sărut mâna!', 'Küss die Hand!'],
          ['Sărut mâinile!', 'Küss die Hand!'],
          ['Numai bine!', 'Alles Gute!'],
          ['Toate cele bune!', 'Alles Gute!'],
          ['Sănătate!', 'Gesundheit!'],
          ['Multă sănătate!', 'Viel Gesundheit!'],
          ['Doamne ajută!', 'Gott helfe!'],
          ['Respectele mele!', 'Meine Hochachtung!'],
          ['Să trăiți!', 'Zu Ihren Diensten!'],
          ['Succes!', 'Viel Erfolg!'],
          ['Baftă!', 'Viel Glück!'],
          ['O duminică plăcută', 'Schönen Sonntag!'],
          ['Drum bun!', 'Gute Fahrt!'],
          ['Călătorie plăcută!', 'Gute Reise!'],
          ['Bine ai venit!', 'Willkommen!'],
          ['Bine ați venit!', 'Herzlich willkommen!'],
          ['Bun venit!', 'Willkommen!']
        ]
      },
      {
        title: 'Lecția 02 · Ce faci?',
        cards: [
          ['Ce faci?', 'Was machst du'],
          ['Ce mai faci?', 'Wie geht es dir'],
          ['Ce faceți?', 'Was machen Sie'],
          ['Ce mai faceți?', 'Wie geht es Ihnen'],
          ['Bine', 'Gut'],
          ['Foarte bine', 'Sehr gut'],
          ['Așa și așa', 'So lala'],
          ['Nu prea bine', 'Nicht so gut'],
          ['Nu așa bine', 'Nicht so gut'],
          ['Rău', 'Schlecht'],
          ['Minunat', 'Wunderbar'],
          ['Asemenea', 'Ebenso'],
          ['La fel', 'Gleichfalls']
        ]
      },
      {
        title: 'Lecția 03 · Mulțumesc',
        cards: [
          ['Mulțumesc', 'Danke'],
          ['Mulțumesc frumos', 'Vielen Dank'],
          ['Mulțumesc mult', 'Vielen Dank'],
          ['Mulțumesc din suflet', 'Vielen Dank von Herzen'],
          ['Mersi', 'Danke'],
          ['Mersi frumos', 'Vielen Dank'],
          ['Sărut mâna', 'Guten Tag'],
          ['Sărut mâinile', 'Guten Tag'],
          ['Cu plăcere', 'Gern geschehen'],
          ['Cu drag', 'Gern'],
          ['Pentru nimic', 'Nicht dafür!'],
          ['La fel', 'Gleichfalls'],
          ['Și eu mulțumesc', 'Ich danke auch'],
          ['Asemenea', 'Ebenso'],
          ['Te rog', 'Bitte'],
          ['Vă rog', 'Bitte']
        ]
      }
    ];

    let deckIndex = 0;
    let cardIndex = 0;
    let flipped = false;
    let hasSelectedDeck = true;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragDeltaX = 0;
    let isDraggingCard = false;
    let didDragCard = false;

    const flashcardPanel = document.querySelector('.flashcard-panel');
    const flipCard = document.getElementById('flipCard');
    const deckTitle = document.getElementById('deckTitle');
    const frontWord = document.getElementById('frontWord');
    const backWord = document.getElementById('backWord');
    const frontNumber = document.getElementById('frontNumber');
    const backNumber = document.getElementById('backNumber');
    const cardCounter = document.getElementById('cardCounter');
    const deckButtons = document.querySelectorAll('.deck-chip[data-deck]');
    let availableVoices = [];

    function loadVoices() {
      if (!('speechSynthesis' in window)) return;
      availableVoices = window.speechSynthesis.getVoices();
    }

    function selectNaturalVoice(lang) {
      const voices = availableVoices.length ? availableVoices : window.speechSynthesis.getVoices();
      const sameLanguage = voices.filter((voice) => voice.lang && voice.lang.toLowerCase().startsWith(lang.toLowerCase().slice(0, 2)));
      const preferred = sameLanguage.find((voice) => /natural|premium|enhanced|neural|microsoft|google|anna|carmen|ioana|german/i.test(voice.name));
      return preferred || sameLanguage.find((voice) => voice.localService) || sameLanguage[0] || null;
    }

    function renderCard() {
      const deck = decks[deckIndex];
      const card = deck.cards[cardIndex];

      deckTitle.textContent = deck.title;
      frontWord.textContent = card[0];
      backWord.textContent = card[1];
      frontNumber.textContent = cardIndex + 1;
      backNumber.textContent = cardIndex + 1;
      cardCounter.textContent = `Card ${cardIndex + 1} / ${deck.cards.length}`;
      flipCard.classList.toggle('is-flipped', flipped);
      const longestSide = Math.max(card[0].length, card[1].length);
      flipCard.classList.toggle('has-long-text', longestSide > 24);
      flipCard.classList.toggle('has-very-long-text', longestSide > 42);
      flashcardPanel.classList.toggle('is-visible', hasSelectedDeck);
      deckButtons.forEach((button) => {
        button.classList.toggle('is-active', Number(button.dataset.deck) === deckIndex);
      });
    }

    function setDeck(index) {
      deckIndex = index;
      cardIndex = 0;
      flipped = false;
      renderCard();
    }

    function moveCard(direction) {
      if (!hasSelectedDeck) return;
      const total = decks[deckIndex].cards.length;
      cardIndex = (cardIndex + direction + total) % total;
      flipped = false;
      renderCard();
    }

    function resetCardDrag() {
      flipCard.classList.remove('is-dragging');
      flipCard.style.transform = '';
      flipCard.style.opacity = '';
      dragDeltaX = 0;
      isDraggingCard = false;
      window.setTimeout(() => {
        didDragCard = false;
      }, 0);
    }

    function animateCardOut(direction) {
      flipCard.classList.remove('is-dragging');
      flipCard.style.transform = '';
      flipCard.style.opacity = '';
      flipCard.classList.add(direction > 0 ? 'is-swiping-right' : 'is-swiping-left');

      window.setTimeout(() => {
        flipCard.classList.remove('is-swiping-right', 'is-swiping-left');
        moveCard(direction > 0 ? 1 : -1);
        flipCard.classList.add('is-entering');
        window.setTimeout(() => {
          flipCard.classList.remove('is-entering');
          didDragCard = false;
        }, 240);
      }, 220);
    }

    function speakCurrentCard(side) {
      if (!hasSelectedDeck || !('speechSynthesis' in window)) return;
      const card = decks[deckIndex].cards[cardIndex];
      const utterance = new SpeechSynthesisUtterance(side === 'back' ? card[1] : card[0]);
      utterance.lang = side === 'back' ? 'de-DE' : 'ro-RO';
      const voice = selectNaturalVoice(utterance.lang);
      if (voice) utterance.voice = voice;
      utterance.rate = side === 'back' ? 0.68 : 0.62;
      utterance.pitch = side === 'back' ? 0.98 : 1.12;
      utterance.volume = 0.95;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    flipCard.addEventListener('pointerdown', (event) => {
      if (!hasSelectedDeck) return;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      dragDeltaX = 0;
      isDraggingCard = true;
      didDragCard = false;
      flipCard.classList.add('is-dragging');
      flipCard.setPointerCapture(event.pointerId);
    });

    flipCard.addEventListener('pointermove', (event) => {
      if (!isDraggingCard) return;
      const deltaY = event.clientY - dragStartY;
      dragDeltaX = event.clientX - dragStartX;

      if (Math.abs(deltaY) > Math.abs(dragDeltaX) && Math.abs(deltaY) > 18) {
        resetCardDrag();
        return;
      }

      if (Math.abs(dragDeltaX) > 6) didDragCard = true;
      const limitedDelta = Math.max(-170, Math.min(170, dragDeltaX));
      const tilt = limitedDelta / 18;
      flipCard.style.transform = `translateX(${limitedDelta}px) rotate(${tilt}deg)`;
      flipCard.style.opacity = String(1 - Math.min(Math.abs(limitedDelta) / 260, .38));
    });

    flipCard.addEventListener('pointerup', () => {
      if (!isDraggingCard) return;
      const finalDelta = dragDeltaX;
      if (Math.abs(finalDelta) > 70) {
        isDraggingCard = false;
        animateCardOut(finalDelta);
        return;
      }
      resetCardDrag();
    });

    flipCard.addEventListener('pointercancel', resetCardDrag);

    flipCard.addEventListener('click', () => {
      if (!hasSelectedDeck || didDragCard) return;
      flipped = !flipped;
      renderCard();
    });

    document.querySelectorAll('.audio-btn').forEach((button) => {
      const play = (event) => {
        event.preventDefault();
        event.stopPropagation();
        speakCurrentCard(button.dataset.audioSide);
      };

      button.addEventListener('pointerdown', (event) => {
        event.stopPropagation();
      });
      button.addEventListener('click', play);
      button.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') play(event);
      });
    });

    document.getElementById('prevCard').addEventListener('click', () => moveCard(-1));
    document.getElementById('nextCard').addEventListener('click', () => moveCard(1));
    deckButtons.forEach((button) => {
      button.addEventListener('click', () => setDeck(Number(button.dataset.deck)));
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') moveCard(-1);
      if (event.key === 'ArrowRight') moveCard(1);
      if (event.key === 'Enter' && event.target === document.body) {
        flipped = !flipped;
        renderCard();
      }
    });

    loadVoices();
    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    renderCard();
  </script>
</body>
</html>
